name: CI · build the bridge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend · imports & smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lean simulation-mode deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn sqlalchemy "pydantic>=2" pydantic-settings \
                      "passlib[bcrypt]" "bcrypt==4.0.1" \
                      "python-jose[cryptography]" python-multipart email-validator

      - name: Smoke-import the FastAPI app
        working-directory: backend
        run: |
          python -c "from app.main import app; print('routes:', len(app.routes))"

  frontend:
    name: Frontend · lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
